<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Membros</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; height: 100vh; }
        .container { background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 300px; text-align: center; margin-top: 50px; }
        button { width: 100%; padding: 12px; margin: 8px 0; border: none; color: #fff; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-acao { background: #00bcd4; }
        .btn-calendario-geral { background: #9c27b0; }
        .btn-calendario { background: #4CAF50; }
        .btn-diretoria { background: #fbc02d; color: #000; }
        .btn-sair { background: #ff5252; margin-top: 20px; }
        .btn-voltar { background: #757575; width: auto; padding: 10px 20px; margin: 10px; }
        
        #area-visualizador, #area-calendario { display: none; width: 100%; height: 100%; flex-direction: column; align-items: center; }
        #area-lista-arquivos { width: 90%; text-align: left; margin: 20px 0; }
        .arquivo-item { background: #333; padding: 10px; margin: 5px 0; border-radius: 4px; cursor: pointer; display: block; width: 100%; text-align: left; }
        .arquivo-item:hover { background: #444; }
        
        /* Container do iframe para controle da máscara */
        .iframe-container { position: relative; width: 90%; height: 80vh; margin-top: 10px; display: none; }
        .iframe-drive { width: 100%; height: 100%; border: none; border-radius: 8px; background: #fff; }
        
        /* Máscara que cobre o botão superior direito do Google Drive */
        .mascara-seta { position: absolute; top: 0; right: 0; width: 65px; height: 55px; background-color: #121212; z-index: 999; border-top-right-radius: 8px; pointer-events: auto; }
    </style>
</head>
<body>

<div id="menu-principal" class="container">
    <h2>Painel de Membros</h2>
    <div id="conteudo-dinamico">Carregando...</div>
</div>

<div id="area-visualizador">
    <button class="btn-voltar" onclick="voltar()">⬅ Voltar</button>
    <div id="area-lista-arquivos"></div>
    
    <div id="wrapper-iframe" class="iframe-container">
        <div class="mascara-seta"></div>
        <iframe id="iframe-drive" class="iframe-drive" src=""></iframe>
    </div>
</div>

<div id="area-calendario">
    <button class="btn-voltar" onclick="voltar()">⬅ Voltar</button>
    <div style="width: 90%; max-width: 800px; margin-top: 20px;">
        <div style="position: relative; width: 100%; padding-bottom: 75%; height: 0; overflow: hidden;">
            <iframe 
                id="iframe-calendario"
                src="" 
                style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0;" 
                frameborder="0" 
                scrolling="no">
            </iframe>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwLf6erORInbn-B3HgJ5QTaYfhoDq5eIpdXbumQPbY7WGzL1HQ1mW6JPxgGcW0sdGTosA/exec";
    const SUPABASE_URL = "https://ssmjxusvrcspnmubyseb.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzbWp4dXN2cmNzcG5tdWJ5c2ViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjA3NTgsImV4cCI6MjA5NzkzNjc1OH0.iEO1OQhx_emhYT_J_7bOYe3ypMqD_RWYvShKPQuRuzk";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Objeto global para armazenar as configurações do banco de dados
    let linksMap = {};

    async function carregarPainel() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) { window.location.replace("index.html"); return; }

        try {
            const { data: perfil, error: erroPerfil } = await supabaseClient.from('perfis').select('grau, diretoria').eq('id', session.user.id).single();
            
            if (erroPerfil || !perfil || !perfil.grau) {
                document.getElementById('conteudo-dinamico').innerHTML = "<p style='color: #ff5252;'>Erro: Seu cadastro está incompleto ou não foi encontrado no banco de dados.</p><button class='btn-sair' onclick='sair()'>Sair</button>";
                return;
            }

            const { data: configs } = await supabaseClient.from('configuracoes').select('grau, link');
            
            // Popula o mapa global com os links do banco de dados
            linksMap = {};
            configs.forEach(c => { linksMap[c.grau] = c.link; });

            let html = "";

            if (["AM", "CM", "MM", "MI"].includes(perfil.grau)) 
                html += `<button class="btn-acao" onclick="abrirPasta('${linksMap['AM'] || ''}')">Acessar Aprendiz</button>`;
            if (["CM", "MM", "MI"].includes(perfil.grau)) 
                html += `<button class="btn-acao" onclick="abrirPasta('${linksMap['CM'] || ''}')">Acessar Companheiro</button>`;
            if (["MM", "MI"].includes(perfil.grau)) 
                html += `<button class="btn-acao" onclick="abrirPasta('${linksMap['MM'] || ''}')">Acessar Mestre</button>`;
            
            // Botão do Calendário Geral (Disponível para todos)
            html += `<button class="btn-calendario-geral" onclick="abrirCalendario('CAL_GERAL')">📅 Calendário Geral</button>`;

            // Botão do Calendário Ordens (Restrito)
            if (["MM", "MI"].includes(perfil.grau) || perfil.diretoria) {
                html += `<button class="btn-calendario" onclick="abrirCalendario('CAL_ORDENS')">📅 Calendário Ordens de Aperfeiçoamento</button>`;
                html += `<button class="btn-acao" style="background: #ff9800;" onclick="window.open('https://1drv.ms/f/c/ddff6b1661f394aa/IgBQjHISn1XjTK8q2zsgf5zqAVS-V0-Ncpbmf7BCBzmIwU0?e=QByTsp', '_blank')">⬇️ Downloads</button>`;
            }

            if (perfil.diretoria) {
                html += `<button class="btn-diretoria" onclick="abrirPasta('${linksMap['DIRETORIA'] || ''}')">Área da Diretoria</button>`;
            }
            
            html += `<button class="btn-sair" onclick="sair()">Sair da Conta</button>`;
            document.getElementById('conteudo-dinamico').innerHTML = html;

        } catch (erroGeral) {
            document.getElementById('conteudo-dinamico').innerHTML = "<p style='color: #ff5252;'>Erro inesperado ao carregar as informações.</p><button class='btn-sair' onclick='sair()'>Sair</button>";
        }
    }

    async function abrirPasta(idDaPasta) {
        if(!idDaPasta) { alert("ID da pasta não encontrado."); return; }
        
        document.getElementById('menu-principal').style.display = 'none';
        document.getElementById('area-visualizador').style.display = 'flex';
        document.getElementById('area-calendario').style.display = 'none';
        document.getElementById('area-lista-arquivos').style.display = 'block';
        document.getElementById('wrapper-iframe').style.display = 'none';
        document.getElementById('area-lista-arquivos').innerHTML = "Carregando arquivos...";

        try {
            const response = await fetch(`${SCRIPT_URL}?id=${idDaPasta}`);
            const arquivos = await response.json();
            mostrarLista(arquivos);
        } catch (error) {
            document.getElementById('area-lista-arquivos').innerHTML = "Erro ao carregar arquivos.";
        }
    }

    function mostrarLista(arquivos) {
        let html = `<h3>Arquivos da Pasta</h3>`;
        if (arquivos.length === 0) { html += "<p>Nenhum arquivo encontrado.</p>"; }
        
        arquivos.forEach(arq => {
            html += `<button class="arquivo-item" onclick="abrirPDF('${arq.id}')">📄 ${arq.name}</button>`;
        });
        
        document.getElementById('area-lista-arquivos').innerHTML = html;
    }

    function abrirPDF(idDoArquivo) {
        document.getElementById('area-lista-arquivos').style.display = 'none';
        const wrapper = document.getElementById('wrapper-iframe');
        const iframe = document.getElementById('iframe-drive');
        iframe.src = `https://drive.google.com/file/d/${idDoArquivo}/preview`;
        wrapper.style.display = 'block';
    }

    function abrirCalendario(chaveCalendario) {
        document.getElementById('menu-principal').style.display = 'none';
        document.getElementById('area-visualizador').style.display = 'none';
        document.getElementById('area-calendario').style.display = 'flex';
        
        const iframeCalendario = document.getElementById('iframe-calendario');
        iframeCalendario.src = linksMap[chaveCalendario] || "";
    }

    function voltar() {
        const wrapper = document.getElementById('wrapper-iframe');
        const iframe = document.getElementById('iframe-drive');
        const iframeCalendario = document.getElementById('iframe-calendario');
        
        if (wrapper && wrapper.style.display === 'block') {
            iframe.src = "";
            wrapper.style.display = 'none';
            document.getElementById('area-lista-arquivos').style.display = 'block';
        } else {
            iframeCalendario.src = ""; 
            document.getElementById('menu-principal').style.display = 'block';
            document.getElementById('area-visualizador').style.display = 'none';
            document.getElementById('area-calendario').style.display = 'none';
        }
    }

    async function sair() { await supabaseClient.auth.signOut(); window.location.href = "index.html"; }
    
    carregarPainel();
</script>
</body>
</html>
