<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Membros</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .header { width: 100%; display: flex; justify-content: space-between; align-items: center; max-width: 800px; }
        .container { width: 100%; max-width: 450px; background: #1e1e1e; padding: 30px; border-radius: 12px; text-align: center; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        button { width: 100%; padding: 14px; margin: 8px 0; border: none; color: #fff; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        .btn-acao { background: #00bcd4; } .btn-acao:hover { background: #008c9e; }
        .btn-diretoria { background: #fbc02d; color: #000; }
        .btn-sair { background: #ff5252; margin-top: 20px; }
        .widgets { display: flex; gap: 20px; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="header">
    <a href="https://guimmaraes.github.io/" style="color:#aaa; text-decoration:none;">← Voltar ao Início</a>
    <div id="relogio" style="font-weight:bold;">--:--:--</div>
</div>

<div class="widgets">
    <a class="weatherwidget-io" href="https://forecast7.com/pt/n25d43n49d27/curitiba/" data-label_1="CURITIBA" data-theme="dark">CURITIBA</a>
    <script>!function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io');</script>
</div>

<div class="container">
    <h2>Painel de Membros</h2>
    <div id="conteudo-dinamico">Carregando...</div>
</div>

<script>
    const SUPABASE_URL = "https://ssmjxusvrcspnmubyseb.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzbWp4dXN2cmNzcG5tdWJ5c2ViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjA3NTgsImV4cCI6MjA5NzkzNjc1OH0.iEO1OQhx_emhYT_J_7bOYe3ypMqD_RWYvShKPQuRuzk";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Relógio
    setInterval(() => document.getElementById('relogio').innerText = new Date().toLocaleTimeString(), 1000);

    async function carregarPainel() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) { window.location.replace("index.html"); return; }

        const { data: perfil } = await supabaseClient.from('perfis').select('grau, diretoria').eq('id', session.user.id).single();

        let html = "";
        if (perfil.grau === "AM" || perfil.grau === "CM" || perfil.grau === "MM" || perfil.diretoria) html += `<button class="btn-acao" onclick="window.open('LINK_AM', '_blank')">Acessar Aprendiz</button>`;
        if (perfil.grau === "CM" || perfil.grau === "MM" || perfil.diretoria) html += `<button class="btn-acao" onclick="window.open('LINK_CM', '_blank')">Acessar Companheiro</button>`;
        if (perfil.grau === "MM" || perfil.diretoria) html += `<button class="btn-acao" onclick="window.open('LINK_MM', '_blank')">Acessar Mestre</button>`;
        if (perfil.diretoria) html += `<button class="btn-diretoria" onclick="window.open('LINK_DIR', '_blank')">Área da Diretoria</button>`;
        
        html += `<button class="btn-sair" onclick="sair()">Sair da Conta</button>`;
        document.getElementById('conteudo-dinamico').innerHTML = html;
    }

    async function sair() { await supabaseClient.auth.signOut(); window.location.href = "index.html"; }
    carregarPainel();
</script>
</body>
</html>
