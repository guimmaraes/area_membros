<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #333; background: #222; color: #fff; }
        button { width: 100%; padding: 12px; margin-top: 15px; border: none; background: #00bcd4; color: #fff; font-weight: bold; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0097a7; }
        .error { color: #ff5252; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Acesso Restrito</h2>
    <input type="email" id="email" placeholder="E-mail" required>
    <input type="password" id="password" placeholder="Senha" required>
    
    <!-- Bloco da LGPD -->
    <div style="text-align: left; margin: 15px 0; font-size: 11px; color: #bbb; display: flex; align-items: flex-start; gap: 8px;">
        <input type="checkbox" id="aceite-lgpd" style="margin-top: 3px; cursor: pointer;">
        <label for="aceite-lgpd" style="cursor: pointer; line-height: 1.4;">
            Li e aceito os <span onclick="mostrarTermos(event)" style="color: #00bcd4; text-decoration: underline; cursor: pointer;">Termos de Uso e Privacidade</span>.
        </label>
    </div>

    <!-- Caixa oculta para exibir o texto da LGPD -->
    <div id="texto-termos" style="display: none; background: #333; padding: 10px; font-size: 10px; color: #fff; border-radius: 4px; margin-bottom: 15px; text-align: left; border: 1px solid #555;">
        Ao acessar, você autoriza o uso de seus dados (Nome, E-mail, CIM e Grau) exclusivamente para controle de acesso ao painel, armazenamento seguro no Supabase e listagem de arquivos, conforme a LGPD.
    </div>

    <button onclick="fazerLogin()">Entrar</button>
    <div class="error" id="mensagem-erro"></div>
</div>

<script>
    const SUPABASE_URL = "https://ssmjxusvrcspnmubyseb.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzbWp4dXN2cmNzcG5tdWJ5c2ViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjA3NTgsImV4cCI6MjA5NzkzNjc1OH0.iEO1OQhx_emhYT_J_7bOYe3ypMqD_RWYvShKPQuRuzk";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function mostrarTermos(event) {
        event.preventDefault();
        const divTermos = document.getElementById('texto-termos');
        if (divTermos.style.display === 'none' || divTermos.style.display === '') {
            divTermos.style.display = 'block';
        } else {
            divTermos.style.display = 'none';
        }
    }

    async function fazerLogin() {
        const erroDiv = document.getElementById('mensagem-erro');
        erroDiv.innerText = ""; 

        const aceitou = document.getElementById('aceite-lgpd').checked;
        if (!aceitou) {
            erroDiv.innerText = "Você precisa aceitar os Termos de Uso e Privacidade para entrar.";
            return;
        }

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
            email: email,
            password: password,
        });

        if (authError) {
            erroDiv.innerText = "Usuário ou senha incorretos.";
            return;
        }

        const { data: perfil, error: perfilError } = await supabaseClient
            .from('perfis')
            .select('grau, diretoria')
            .eq('id', authData.user.id)
            .single();

        if (perfilError || !perfil) {
            erroDiv.innerText = "Erro ao carregar permissões do perfil.";
            return;
        }

        await supabaseClient
            .from('perfis')
            .update({ aceite_lgpd: true })
            .eq('id', authData.user.id);

        if (perfil.grau === "MM" || perfil.grau === "CM" || perfil.grau === "AM" || perfil.diretoria === true) {
            window.location.href = "painel.html";
        } else {
            erroDiv.innerText = "Perfil sem nível de acesso configurado.";
        }
    }
</script>
</body>
</html>
