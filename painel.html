<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso Restrito</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-container { background: #1e1e1e; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); width: 300px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 4px; border: 1px solid #333; background: #222; color: #fff; }
        button { width: 100%; padding: 12px; margin-top: 15px; border: none; background: #00bcd4; color: #fff; font-weight: bold; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0097a7; }
        .error { color: #ff5252; margin-top: 15px; font-size: 14px; }
    </style>
</head>
<script>
    // Configurações do Supabase
    const SUPABASE_URL = "https://ssmjxusvrcspnmubyseb.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNzbWp4dXN2cmNzcG5tdWJ5c2ViIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIzNjA3NTgsImV4cCI6MjA5NzkzNjc1OH0.iEO1OQhx_emhYT_J_7bOYe3ypMqD_RWYvShKPQuRuzk";
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 1. Verifica se o usuário está logado ao abrir a página
    async function verificarSessao() {
        const { data: { session }, error } = await supabaseClient.auth.getSession();
        
        // Se não tiver sessão (não logou), chuta de volta para o index
        if (!session || error) {
            window.location.href = "index.html";
            return;
        }

        carregarPerfil(session.user.id);
    }

    // 2. Busca o perfil e monta os botões
    async function carregarPerfil(userId) {
        const divConteudo = document.getElementById('conteudo-dinamico');
        
        const { data: perfil, error } = await supabaseClient
            .from('perfis')
            .select('grau, diretoria')
            .eq('id', userId)
            .single();

        if (error || !perfil) {
            divConteudo.innerHTML = "<p>Erro ao carregar seu perfil.</p>";
            return;
        }

        let botoesHtml = "";

        // Regras de exibição dos botões (ajuste conforme precisar)
        botoesHtml += `<button class="btn-acao" onclick="abrirSecao('arquivos')">Documentos Gerais</button>`;
        botoesHtml += `<button class="btn-calendario-geral" onclick="abrirSecao('calendario')">Calendário</button>`;
        
        if (perfil.diretoria) {
            botoesHtml += `<button class="btn-diretoria" onclick="alert('Área da Diretoria em construção')">Área da Diretoria</button>`;
        }

        botoesHtml += `<button class="btn-sair" onclick="fazerLogout()">Sair</button>`;

        divConteudo.innerHTML = botoesHtml;
    }

    // 3. Função de Logout
    async function fazerLogout() {
        await supabaseClient.auth.signOut();
        window.location.href = "index.html";
    }

    // 4. Navegação básica entre o menu e as áreas
    function abrirSecao(secao) {
        document.getElementById('menu-principal').style.display = 'none';
        
        if (secao === 'arquivos') {
            document.getElementById('area-visualizador').style.display = 'flex';
        } else if (secao === 'calendario') {
            document.getElementById('area-calendario').style.display = 'flex';
        }
    }

    function voltar() {
        document.getElementById('area-visualizador').style.display = 'none';
        document.getElementById('area-calendario').style.display = 'none';
        document.getElementById('menu-principal').style.display = 'block';
    }

    // Roda a verificação de segurança assim que a página abre
    verificarSessao();
</script>
</body>
</html>
